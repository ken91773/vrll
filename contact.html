<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact VRLL — Send an Inquiry</title>
<meta name="description" content="Send a question, comment, or feedback about VRLL — Helicopter Longline Simulator." />
<meta name="theme-color" content="#0b1622" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0b1622;
    --panel: rgba(12, 20, 30, 0.82);
    --border: rgba(120, 150, 180, 0.18);
    --text: #eaf1f8;
    --muted: #9fb1c2;
    --dim: #6f8296;
    --accent: #f2b134;
    --accent-2: #5fb0d6;
    --radius: 14px;
    --maxw: 780px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-family: 'Barlow Condensed', 'Inter', sans-serif;
    font-size: clamp(2.2rem, 5vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.15;
    margin: 0 0 0.35em;
  }

  a { color: var(--accent-2); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    background: rgba(8, 14, 22, 0.9);
  }

  .topbar a {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--muted);
  }

  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 56px 22px 80px;
  }

  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .lead {
    color: var(--muted);
    font-size: 1.08rem;
    margin: 0 0 28px;
  }

  .form-frame {
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
  }

  .form-frame iframe {
    display: block;
    width: 100%;
    height: 780px;
    border: 0;
    background: #fff;
  }

  .form-fallback {
    margin: 18px 0 0;
    color: var(--dim);
    font-size: 0.9rem;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 36px 22px 50px;
    color: var(--dim);
    font-size: 0.88rem;
    border-top: 1px solid var(--border);
  }

  footer a { color: var(--muted); }

  @media (max-width: 600px) {
    .wrap { padding: 42px 12px 60px; }
    .form-frame iframe { height: 840px; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html">&larr; Back to VRLL</a>
  </div>

  <main class="wrap">
    <div class="eyebrow">Contact VRLL</div>
    <h1>Send an inquiry</h1>
    <p class="lead">Questions, comments, and simulator feedback are welcome.</p>

    <div class="form-frame">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSfIP2Gi2Dzd_ekmIArTsYFFi3K1DJ-K7JHo30_IbU0hdK5Ijw/viewform?embedded=true"
        title="VRLL inquiry form">Loading&hellip;</iframe>
    </div>
    <p class="form-fallback">
      Form not displaying?
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSfIP2Gi2Dzd_ekmIArTsYFFi3K1DJ-K7JHo30_IbU0hdK5Ijw/viewform" target="_blank" rel="noopener">Open it in Google Forms</a>.
    </p>
  </main>

  <footer>
    <p>
      <a href="index.html">VRLL</a> &nbsp;·&nbsp;
      <a href="https://github.com/ken91773/vrll/releases/latest">Download</a> &nbsp;·&nbsp;
      <a href="about-ken.html">About Ken</a>
    </p>
    <p>&copy; <span id="year">2026</span> Aerobase LLC</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
